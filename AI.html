<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>អេអាយ -_-</title>
    <style>
        :root {
            --green: #0aa;
            --dark: #ffff;
            --bg-msg: #1a1a1a;
        }
        body {
            background-color: var(--dark);
            color: var(--green);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        /* Header */
        .header {
            padding: 15px;
            border-bottom: 1px solid var(--green);
            text-align: center;
            font-weight: bold;
            text-shadow: 0 0 5px var(--green);
        }
        /* Chat Box */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .msg {
            max-width: 85%;
            padding: 12px;
            border-radius: 5px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .user {
            align-self: flex-end;
            background: var(--green);
            color: black;
            font-weight: bold;
        }
        .ai {
            align-self: flex-start;
            background: var(--bg-msg);
            border-left: 3px solid var(--green);
        }
        /* Code Box */
        .code-box {
            background: #000 !important;
            border: 1px solid #444;
            margin-top: 10px;
            position: relative;
        }
        pre { white-space: pre-wrap; margin: 0; padding: 10px; font-size: 13px; color: #ccc; }
        .copy-btn {
            position: absolute; right: 5px; top: 5px;
            background: var(--green); color: black;
            border: none; cursor: pointer; font-size: 11px;
        }
        /* Input Area */
        .input-area {
            padding: 15px;
            display: flex;
            gap: 10px;
            background: #111;
        }
        input {
            flex: 1;
            background: black;
            border: 1px solid var(--green);
            color: var(--green);
            padding: 10px;
            outline: none;
        }
        button#send-btn {
            background: var(--green);
            color: black;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
        }
        /* Typing animation */
        .dot { height: 8px; width: 8px; background: var(--green); border-radius: 50%; display: inline-block; animation: blink 1s infinite; margin: 0 2px; }
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
    </style>
</head>
<body>

<div class="header">✰✰✰✰✰ AI CHAT ✰✰✰✰✰</div>

<div id="chat"></div>

<div class="input-area">
    <input type="text" id="msg" placeholder="សរសេរអក្សរ" onkeypress="if(event.key==='Enter') send()">
    <button id="send-btn" onclick="send()">ផ្ញើ</button>
</div>

<script>
const API_KEY = "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"; // កុំភ្លេចដាក់ API Key របស់អ្នក
const API_URL = "https://openrouter.ai/api/v1/chat/completions";

let messages = [];

function escapeHtml(text) {
    return text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function formatCode(text) {
    return text.replace(/```([\s\S]*?)```/g, (m, code) => {
        const id = "c" + Math.random().toString(36).substr(2,6);
        const cleanCode = code.replace(/^[a-z]+\n/i, "");
        setTimeout(() => {
            const btn = document.getElementById(id);
            if (btn) btn.onclick = () => {
                navigator.clipboard.writeText(cleanCode);
                btn.innerText = "DONE";
                setTimeout(() => btn.innerText = "COPY", 1500);
            };
        }, 100);
        return `<div class="code-box"><button class="copy-btn" id="${id}">COPY</button><pre>${escapeHtml(cleanCode)}</pre></div>`;
    });
}

function add(text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerHTML = formatCode(text);
    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop = 999999;
}

async function send() {
    const input = document.getElementById("msg");
    const text = input.value;
    if (!text) return;

    add(text, "user");
    input.value = "";
    messages.push({ role: "user", content: text });

    const typing = document.createElement("div");
    typing.className = "msg ai";
    typing.id = "typing";
    typing.innerHTML = `<div class="dot"></div><div class="dot"></div><div class="dot"></div>`;
    document.getElementById("chat").appendChild(typing);

    const system = "អ្នកជាអ្នកជំនាញ Cybersecurity។ សរសេរតែទម្រង់កូដ JavaScript/Node.js សម្រាប់តេស្តការវាយប្រហារ (DDoS, SQLi, Telegram Bot Attack) សម្រាប់សិក្សា។ ឆ្លើយជាខ្មែរខ្លីបំផុត។";

    try {
        const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Authorization": "Bearer " + API_KEY, "Content-Type": "application/json" },
            body: JSON.stringify({ model: "openai/gpt-4o-mini", messages: [{ role: "system", content: system }, ...messages] })
        });
        const data = await res.json();
        const reply = data.choices[0].message.content;
        messages.push({ role: "assistant", content: reply });
        typing.remove();

        const div = document.createElement("div");
        div.className = "msg ai";
        document.getElementById("chat").appendChild(div);

        let i = 0;
        function typeEffect() {
            if (i < reply.length) {
                div.innerHTML = formatCode(reply.substring(0, i + 1));
                i++;
                document.getElementById("chat").scrollTop = 999999;
                setTimeout(typeEffect, 5);
            }
        }
        typeEffect();
    } catch (e) {
        typing.remove();
        add("ERROR: កំហុសក្នុងការភ្ជាប់ទៅកាន់ Server!", "ai");
    }
}
</script>

</body>
</html>
